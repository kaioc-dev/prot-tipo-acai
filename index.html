<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Açaí - O melhor que tá tendo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <h1>Play <span>Açaí</span></h1>
            <p>O melhor que tá tendo!</p>
            <a href="https://instagram.com/acaidoplayoficial" target="_blank" class="insta-link">
                <i class="fab fa-instagram"></i> @acaidoplayoficial
            </a>
        </div>
    </header>

    <main class="menu-container" id="menu-list">
        <h2 class="section-title">Nossos Copos</h2>
        <div id="products-container"></div>
    </main>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Produto</h2>
                <p id="modal-desc">Escolha seus acompanhamentos</p>
                <button class="close-btn" onclick="closeModal('product-modal')">&times;</button>
            </div>
            <div class="modal-body" id="options-container">
                </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="addToCart()">Adicionar ao Carrinho - R$ <span id="modal-price">0,00</span></button>
            </div>
        </div>
    </div>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Seu Pedido</h2>
                <button class="close-btn" onclick="closeModal('cart-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cart-items"></div>
                <div class="cart-total">Total: R$ <span id="cart-total-price">0,00</span></div>
                
                <h3 class="checkout-title">Finalizar Pedido</h3>
                <form id="checkout-form">
                    <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" required>
                    
                    <select id="tipo-entrega" onchange="toggleAddress()" required>
                        <option value="">Como deseja receber?</option>
                        <option value="entrega">Entrega em Domicílio</option>
                        <option value="retirada">Retirar no Local</option>
                    </select>

                    <input type="text" id="cliente-endereco" placeholder="Rua, Número, Bairro, Referência" style="display:none;">

                    <select id="forma-pagamento" onchange="toggleTroco()" required>
                        <option value="">Forma de Pagamento</option>
                        <option value="pix">Pix</option>
                        <option value="credito">Cartão de Crédito</option>
                        <option value="debito">Cartão de Débito</option>
                        <option value="dinheiro">Dinheiro</option>
                    </select>

                    <input type="number" id="cliente-troco" placeholder="Troco para quanto?" style="display:none;">
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="sendWhatsApp()"><i class="fab fa-whatsapp"></i> Enviar Pedido</button>
            </div>
        </div>
    </div>

    <footer id="cart-bar" class="cart-bar hidden" onclick="openCart()">
        <div class="cart-info">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-count">0 itens</span>
        </div>
        <div class="cart-total-bar">R$ <span id="bar-total">0,00</span></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
